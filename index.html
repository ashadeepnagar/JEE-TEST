
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1rem 0; }
.header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
.header-left { flex: 1; }
.header h1 { font-size: 25px; font-weight: 500; text-align: center; color: var(--color-text-primary); }
.header p { font-size: 20px; color: var(--color-text-secondary); text-align: center; margin-top: 4px; }
.timer-box { display: flex; align-items: center; gap: 12px; background: var(--color-background-secondary); padding: 12px 16px; border-radius: 8px; }
.timer-display { font-size: 24px; font-weight: 600; color: var(--color-text-primary); font-family: monospace; min-width: 80px; }
.timer-display.warning { color: #ff9800; }
.timer-display.critical { color: #f44336; }
.start-btn { padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
.start-btn:hover:not(:disabled) { background: #45a049; }
.start-btn:disabled { background: #cccccc; cursor: not-allowed; }
.finish-btn { padding: 8px 16px; background: #FF6F00; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.15s; margin-left: 10px; }
.finish-btn:hover { background: #E65100; }
.exam-not-started { opacity: 0.5; pointer-events: none; }
.topic-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
.topic-btn { font-size: 15px; padding: 6px 14px; border-radius: 20px; border: 2px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.2s; font-weight: bold; }
.topic-btn.active { background: #2196F3; color: white; border-color: #1976D2; box-shadow: 0 2px 8px rgba(33, 150, 243, 0.4); }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; text-align: center; }
.stat-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-lbl { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.completion-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
.completion-modal.show { display: flex; }
.completion-card { background: white; padding: 40px; border-radius: 12px; text-align: center; max-width: 500px; }
.completion-card h2 { font-size: 28px; color: #4CAF50; margin-bottom: 20px; }
.final-score { font-size: 48px; font-weight: 700; color: #2196F3; margin: 20px 0; }
.score-details { font-size: 16px; color: #666; margin: 10px 0; line-height: 1.8; }
.score-percentage { font-size: 24px; font-weight: 600; color: #FF9800; margin-top: 20px; }
.q-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
.q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.q-num { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); }
.q-topic { font-size: 14px; padding: 3px 8px; border-radius: 12px; background: var(--color-background-info); color: var(--color-text-info); }
.q-text { font-size: 18px; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 12px; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.opt { padding: 8px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 13px; font-weight: bold; color: var(--color-text-primary); cursor: pointer; transition: all 0.15s; background: var(--color-background-primary); text-align: left; display: flex; align-items: center; gap: 8px; }
.opt:hover:not(:disabled) { background: var(--color-background-secondary); border-color: var(--color-border-secondary); }
.opt.selected { background: var(--color-background-info); border-color: var(--color-border-info); }
.opt.correct { background: var(--color-background-success); color: var(--color-text-success); border-color: var(--color-border-success); }
.opt.wrong { background: var(--color-background-danger); color: var(--color-text-danger); border-color: var(--color-border-danger); }
.checkbox { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--color-border-secondary); border-radius: 3px; background: white; flex-shrink: 0; position: relative; }
.opt.selected .checkbox { background: #2196F3; border-color: #2196F3; }
.opt.selected .checkbox::after { content: '✓'; color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; font-weight: bold; }
.opt.correct .checkbox { background: #4CAF50; border-color: #4CAF50; }
.opt.correct .checkbox::after { content: '✓'; color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; font-weight: bold; }
.opt.wrong .checkbox { background: #f44336; border-color: #f44336; }
.opt.wrong .checkbox::after { content: '✗'; color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; font-weight: bold; }
.answer-box { display: none; margin-top: 10px; padding: 10px 14px; border-radius: var(--border-radius-md); background: var(--color-background-success); border-left: 3px solid var(--color-text-success); }
.answer-box.show { display: block; }
.answer-box .ans-label { font-size: 12px; font-weight: 700; color: var(--color-text-success); margin-bottom: 4px; }
.answer-box .ans-text { font-size: 13px; font-weight: 700; color: var(--color-text-primary); line-height: 1.5; }
.show-ans-btn { font-size: 12px; padding: 5px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
.show-ans-btn:hover:not(:disabled) { background: var(--color-background-secondary); }
.show-ans-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.q-footer { display: flex; align-items: center; justify-content: space-between; }
.hidden { display: none; }
</style>

<div class="wrap">
  <div class="header">
    <div class="header-left">
      <h1>JEE Main practice set</h1>
      <p>75 questions · 3 hours · Check/uncheck answers · Click start to begin</p>
    </div>
    <div class="timer-box">
      <div class="timer-display" id="timer">3:00:00</div>
      <button class="start-btn" id="startBtn" onclick="startExam()">START EXAM</button>
      <button class="finish-btn hidden" id="finishBtn" onclick="finishExamEarly()">FINISH EXAM</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="total-q">75</div><div class="stat-lbl">Total questions</div></div>
    <div class="stat-card"><div class="stat-val" id="attempted">0</div><div class="stat-lbl">Attempted</div></div>
    <div class="stat-card"><div class="stat-val" id="correct-count">0</div><div class="stat-lbl">Correct</div></div>
    <div class="stat-card"><div class="stat-val" id="score-display">0%</div><div class="stat-lbl">Score</div></div>
  </div>

  <div class="topic-nav exam-not-started" id="topic-nav"></div>
  <div id="questions-area" class="exam-not-started"></div>

  <div class="completion-modal" id="completionModal">
    <div class="completion-card">
      <h2>🎉 Test Completed!</h2>
      <div class="final-score" id="finalScore">0</div>
      <div class="score-details">
        <div>Total Questions: <strong id="totalQuestions">75</strong></div>
        <div>Correct Answers: <strong id="correctAnswers">0</strong></div>
        <div>Wrong Answers: <strong id="wrongAnswers">0</strong></div>
        <div>Unattempted: <strong id="unattempted">75</strong></div>
      </div>
      <div class="score-percentage" id="scorePercentage">Score: 0%</div>
    </div>
  </div>
</div>

<script src="js/questions.js"></script>
<script>
let answeredMap = {};

let examStarted = false;
let timeRemaining = 3 * 60 * 60; // 3 hours in seconds
let timerInterval = null;
let alertShown = false;

let attempted = 0, correct = 0;

function updateStats() {
  document.getElementById('attempted').textContent = attempted;
  document.getElementById('correct-count').textContent = correct;
  const percentage = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
  document.getElementById('score-display').textContent = percentage + '%';
}

let activeTopicId = topics[0].id;

function startExam() {
  examStarted = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = 'EXAM IN PROGRESS';
  document.getElementById('finishBtn').classList.remove('hidden');
  document.getElementById('topic-nav').classList.remove('exam-not-started');
  document.getElementById('questions-area').classList.remove('exam-not-started');
  
  startTimer();
  renderNav();
  renderQuestions();
}

function startTimer() {
  timerInterval = setInterval(() => {
    timeRemaining--;
    updateTimerDisplay();
    
    // Check if 15 minutes remaining and show alert
    if (timeRemaining === 15 * 60 && !alertShown) {
      alertShown = true;
      alert('⏰ ALERT: 15 minutes remaining in your exam!');
    }
    
    // Check if time is up
    if (timeRemaining <= 0) {
      clearInterval(timerInterval);
      completeExam();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const hours = Math.floor(timeRemaining / 3600);
  const minutes = Math.floor((timeRemaining % 3600) / 60);
  const seconds = timeRemaining % 60;
  
  const timeStr = `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  const timerEl = document.getElementById('timer');
  timerEl.textContent = timeStr;
  
  // Change color based on time remaining
  if (timeRemaining <= 15 * 60) {
    timerEl.classList.add('critical');
    timerEl.classList.remove('warning');
  } else if (timeRemaining <= 30 * 60) {
    timerEl.classList.add('warning');
    timerEl.classList.remove('critical');
  }
}

function finishExamEarly() {
  clearInterval(timerInterval);
  examStarted = false;
  document.getElementById('finishBtn').classList.add('hidden');
  completeExam();
}

function completeExam() {
  document.getElementById('topic-nav').classList.add('exam-not-started');
  document.getElementById('questions-area').classList.add('exam-not-started');
  
  const totalQs = 75;
  const wrongAnswers = attempted - correct;
  const unattempted = totalQs - attempted;
  const percentage = Math.round((correct / totalQs) * 100);
  
  document.getElementById('totalQuestions').textContent = totalQs;
  document.getElementById('correctAnswers').textContent = correct;
  document.getElementById('wrongAnswers').textContent = wrongAnswers;
  document.getElementById('unattempted').textContent = unattempted;
  document.getElementById('finalScore').textContent = correct;
  document.getElementById('scorePercentage').textContent = `Score: ${percentage}%`;
  
  document.getElementById('completionModal').classList.add('show');
}

function renderNav() {
  const nav = document.getElementById('topic-nav');
  nav.innerHTML = topics.map(t =>
    `<button class="topic-btn ${t.id === activeTopicId ? 'active' : ''}" onclick="switchTopic('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchTopic(id) {
  if (!examStarted) return;
  activeTopicId = id;
  renderNav();
  renderQuestions();
}

function renderQuestions() {
  const topic = topics.find(t => t.id === activeTopicId);
  const area = document.getElementById('questions-area');
  let globalOffset = 0;
  for (let ti = 0; ti < topics.length; ti++) {
    if (topics[ti].id === activeTopicId) break;
    globalOffset += topics[ti].qs.length;
  }

  area.innerHTML = topic.qs.map((q, idx) => {
    const gIdx = globalOffset + idx;
    const state = answeredMap[gIdx];
    return `
    <div class="q-card" id="qcard-${gIdx}">
      <div class="q-meta">
        <span class="q-num">Q${idx+1}</span>
        <span class="q-topic">${topic.label}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((opt, oi) => {
          let cls = 'opt';
          if (state !== undefined && state !== null) {
            if (oi === q.ans) cls += ' correct';
            else if (oi === state && state !== q.ans) cls += ' wrong';
          }
          if (state === oi) cls += ' selected';
          return `<button class="${cls}" onclick="selectOpt(${gIdx},${oi},${q.ans})"><span class="checkbox"></span><span>${opt}</span></button>`;
        }).join('')}
      </div>
      <div class="q-footer">
        <div></div>
        <button class="show-ans-btn" id="showBtn-${gIdx}" onclick="revealAns(${gIdx})" ${state === undefined || state === null ? 'disabled' : ''}>Show answer</button>
      </div>
      <div class="answer-box ${state !== undefined && state !== null ? 'show' : ''}" id="ans-${gIdx}">
        <div class="ans-label">Correct answer: ${q.opts[q.ans]}</div>
        <div class="ans-text">${q.exp}</div>
      </div>
    </div>`;
  }).join('');
}

function selectOpt(gIdx, chosen, correct_idx) {
  if (!examStarted) return;
  
  if (answeredMap[gIdx] === chosen) {
    // Uncheck if already selected
    answeredMap[gIdx] = null;
    attempted--;
    if (chosen === correct_idx) correct--;
  } else if (answeredMap[gIdx] === undefined || answeredMap[gIdx] === null) {
    // Check new answer
    answeredMap[gIdx] = chosen;
    attempted++;
    if (chosen === correct_idx) correct++;
  } else {
    // Change answer
    if (answeredMap[gIdx] === correct_idx) correct--;
    answeredMap[gIdx] = chosen;
    if (chosen === correct_idx) correct++;
  }
  
  updateStats();
  renderQuestions();
  
  // Enable show answer button after option is selected
  setTimeout(() => {
    const showBtn = document.getElementById('showBtn-' + gIdx);
    if (showBtn && answeredMap[gIdx] !== null && answeredMap[gIdx] !== undefined) {
      showBtn.disabled = false;
    }
  }, 0);
}

function revealAns(gIdx) {
  const box = document.getElementById('ans-'+gIdx);
  if (box) box.classList.add('show');
}

if (typeof document !== 'undefined') {
  updateTimerDisplay();
}
</script>
